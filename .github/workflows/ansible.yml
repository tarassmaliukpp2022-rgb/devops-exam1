name: "Task 2 — Ansible Install K8s/Minikube/Helm"

on:
  push:
    branches:
      - main
    paths:
      - "task2/**"
  workflow_dispatch:
    inputs:
      node_ip:
        description: "IP address of target VM"
        required: true
        default: "104.248.32.195"

env:
  ANSIBLE_DIR: task2/ansible

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Validate (перевірка без встановлення)
  # Вимога: "перевірка правильності без встановлення"
  # ─────────────────────────────────────────
  validate:
    name: "Validate Ansible Playbook"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible ansible-lint

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Set node IP in inventory
        run: |
          NODE_IP="${{ github.event.inputs.node_ip || '104.248.32.195' }}"
          sed -i "s/{{ NODE_IP }}/$NODE_IP/g" ${{ env.ANSIBLE_DIR }}/inventory.ini

      - name: Validate playbook syntax (--syntax-check)
        run: |
          ansible-playbook \
            -i ${{ env.ANSIBLE_DIR }}/inventory.ini \
            ${{ env.ANSIBLE_DIR }}/playbook.yml \
            --syntax-check
        # Якщо синтаксис неправильний — зупиняє конвеєр!

      - name: Dry run playbook (--check mode)
        run: |
          ansible-playbook \
            -i ${{ env.ANSIBLE_DIR }}/inventory.ini \
            ${{ env.ANSIBLE_DIR }}/playbook.yml \
            --check \
            --private-key /tmp/ssh_key \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'"
        continue-on-error: true
        # --check = dry run, нічого не встановлює

  # ─────────────────────────────────────────
  # JOB 2: Install (реальне встановлення)
  # Запускається лише якщо validate пройшов
  # ─────────────────────────────────────────
  install:
    name: "Install K8s/Minikube/Helm"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH key
        run: |
          # Секрет передається через GitHub Secrets — не видно у логах
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Set node IP in inventory
        # Параметричне задання вузлів через workflow_dispatch input
        run: |
          NODE_IP="${{ github.event.inputs.node_ip || '104.248.32.195' }}"
          sed -i "s/{{ NODE_IP }}/$NODE_IP/g" ${{ env.ANSIBLE_DIR }}/inventory.ini

      - name: Run Ansible playbook
        run: |
          ansible-playbook \
            -i ${{ env.ANSIBLE_DIR }}/inventory.ini \
            ${{ env.ANSIBLE_DIR }}/playbook.yml \
            --private-key /tmp/ssh_key \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            -v

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/ssh_key
