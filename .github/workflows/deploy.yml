name: "Task 3 — Deploy Application"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "both"
        type: choice
        options:
          - dev
          - release
          - both

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devops-exam-app

jobs:
  build:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ghcr.io -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Clone app repository
        run: git clone https://github.com/YulianSalo/devops-exam-pt2.git app

      - name: Build dev image (from develop branch)
        if: ${{ github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both' }}
        run: |
          cd app
          git checkout develop
          docker build -t ghcr.io/${{ secrets.DOCKER_USERNAME }}/devops-exam-app:develop .
          docker push ghcr.io/${{ secrets.DOCKER_USERNAME }}/devops-exam-app:develop

      - name: Build release image (from tag 1.0.0)
        if: ${{ github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both' }}
        run: |
          cd app
          git checkout 1.0.0
          docker build -t ghcr.io/${{ secrets.DOCKER_USERNAME }}/devops-exam-app:1.0.0 .
          docker push ghcr.io/${{ secrets.DOCKER_USERNAME }}/devops-exam-app:1.0.0

  validate:
    name: "Validate Deployment"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose files
        run: |
          docker compose -f task3/docker-compose/docker-compose.dev.yml config
          docker compose -f task3/docker-compose/docker-compose.release.yml config
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

  deploy:
    name: "Deploy to VM"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Copy docker-compose files to VM
        run: |
          scp -i /tmp/ssh_key \
            -o StrictHostKeyChecking=no \
            task3/docker-compose/docker-compose.dev.yml \
            task3/docker-compose/docker-compose.release.yml \
            root@${{ secrets.VM_IP }}:/root/

      - name: Deploy dev environment (port 8002)
        if: ${{ github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both' }}
        run: |
          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no root@${{ secrets.VM_IP }} "
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login ghcr.io -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin
            docker pull ghcr.io/${{ secrets.DOCKER_USERNAME }}/devops-exam-app:develop
            docker stop app-dev || true
            docker rm app-dev || true
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose -f /root/docker-compose.dev.yml up -d
            echo 'Dev deployed on port 8002'
          "

      - name: Deploy release environment (port 8003)
        if: ${{ github.event.inputs.environment == 'release' || github.event.inputs.environment == 'both' }}
        run: |
          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no root@${{ secrets.VM_IP }} "
            echo '${{ secrets.DOCKER_PASSWORD }}' | docker login ghcr.io -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin
            docker pull ghcr.io/${{ secrets.DOCKER_USERNAME }}/devops-exam-app:1.0.0
            docker stop app-release || true
            docker rm app-release || true
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose -f /root/docker-compose.release.yml up -d
            echo 'Release deployed on port 8003'
          "

      - name: Verify deployment
        run: |
          sleep 10
          ssh -i /tmp/ssh_key -o StrictHostKeyChecking=no root@${{ secrets.VM_IP }} "
            docker ps | grep app
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/ssh_key
